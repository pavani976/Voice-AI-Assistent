<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🎙️ AI Voice Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="wrapper">
<div class="container">
    <h1>🎙️ AI Voice Assistant</h1>
    <button id="micBtn" class="mic-btn">
        🎤 Speak Now
    </button>
    <p id="status">Click the button and speak</p>
    <div class="box" id="chatBox">
        <h3>💬 Assistant says:</h3>
        <p id="response"></p>
    </div>
</div>
<div class="image-side">

    <!-- 🌊 Wave Canvas -->
    <canvas id="waveCanvas"></canvas>

    <!-- 🤖 AI Image -->
    <img src="/static/assistant.png" id="aiImage">

</div>
</div>
<script src="/static/script.js"></script>
</body>
</html>
